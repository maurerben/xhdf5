name: build-and-test

on:
  push:
    branches: [master, development]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Full cross product of the two build options (4 jobs).
        enable_hdf5: [ON, OFF]
        enable_mpi:  [ON, OFF]

    name: "HDF5=${{ matrix.enable_hdf5 }} MPI=${{ matrix.enable_mpi }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake ninja-build

          HDF5="${{ matrix.enable_hdf5 }}"
          MPI="${{ matrix.enable_mpi }}"

          if [ "$MPI" = "ON" ]; then
            sudo apt-get install -y openmpi-bin libopenmpi-dev
          fi

          if [ "$HDF5" = "ON" ] && [ "$MPI" = "ON" ]; then
            # Parallel HDF5 (built against OpenMPI).
            sudo apt-get install -y libhdf5-openmpi-dev
          elif [ "$HDF5" = "ON" ]; then
            # Serial HDF5.
            sudo apt-get install -y libhdf5-dev
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install fypp
        run: pip install fypp

      - name: Configure
        run: |
          EXTRA=""
          if [ "${{ matrix.enable_mpi }}" = "ON" ]; then
            # Build with the MPI Fortran wrapper so MPI + parallel HDF5 resolve.
            EXTRA="-DCMAKE_Fortran_COMPILER=mpif90"
            if [ "${{ matrix.enable_hdf5 }}" = "ON" ]; then
              EXTRA="$EXTRA -DHDF5_PREFER_PARALLEL=ON"
            fi
          fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_HDF5=${{ matrix.enable_hdf5 }} \
            -DENABLE_MPI=${{ matrix.enable_mpi }} \
            $EXTRA

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          OMPI_MCA_rmaps_base_oversubscribe: "1"
